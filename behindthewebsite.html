<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fatima Ali</title>
    
    <!-- Link to CSS file (in <head>) -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Welcome Screen -->
    <div id="welcomeScreen">
        <div class="welcome-content">
            <h1>Welcome</h1>
            <p>Click anywhere to enter</p>
        </div>
        <button class="skip-btn" onclick="skipWelcome()">Skip →</button>
    </div>

    <!-- Audio -->
    <audio id="welcomeMusic" loop>
        <source src="https://raw.githubusercontent.com/Fatehma110/My-Website/main/Strangerthings.mp3" type="audio/mpeg">
    </audio>

    <!-- Header -->
    <header>
        <div class="logo">FATIMA ALI</div>
    </header>

    <!-- Main Content -->
    <main>
        <section class="essays-section">
            <h2>ESSAYS</h2>
            <div class="essay-list">
                <a href="Coming Soon.html" class="essay-item">Coming Soon!</a>
            </div>
        </section>
    </main>

    <!-- Gallery -->
    <div class="gallery">
        <img src="https://fatehma110.github.io/My-Website/photo1.png" alt="Photo 1" onclick="openLightbox(0)">
        
        <div class="video-container" onclick="openLightbox(1)">
            <video autoplay loop muted playsinline>
                <source src="https://fatehma110.github.io/My-Website/focus.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <button class="close-btn" onclick="closeLightbox()">&times;</button>
        <div id="lightbox-media"></div>
    </div>

    <!-- Link to JavaScript file (at bottom, before </body>) -->
    <script src="script.js"></script>
</body>
</html>
